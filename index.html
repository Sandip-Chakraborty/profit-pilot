<script>
// ===============================
// VIEW SWITCH + HELPERS (same)
// ===============================
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  clearErrors();
  hideAlerts();
}

function togglePwd(inputId, iconId) {
  const inp = document.getElementById(inputId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function clearErrors() {
  document.querySelectorAll('.err-msg').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.form-input').forEach(i => i.classList.remove('error'));
}

function hideAlerts() {
  document.querySelectorAll('.alert-box').forEach(a => {
    a.classList.remove('show', 'alert-success', 'alert-error');
  });
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `alert-box show alert-${type}`;
}

// ===============================
// 🔥 LOGIN (FIXED)
// ===============================
async function handleLogin() {
  clearErrors(); hideAlerts();

  const userId = document.getElementById('login-uid').value.trim();
  const password = document.getElementById('login-pwd').value;

  if (!userId) {
    showErr('err-login-uid', 'Enter User ID');
    return;
  }
  if (!password) {
    showErr('err-login-pwd', 'Enter Password');
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId, password })
    });

    const data = await res.json();
    console.log("LOGIN RESPONSE:", data);

    if (data.success) {
      localStorage.setItem("token", data.token);
      window.location.href = "/dashboard";
    } else {
      showAlert('login-alert', data.message, 'error');
    }

  } catch (err) {
    showAlert('login-alert', 'Server error', 'error');
  }
}

// ===============================
// 🔥 REGISTER (FIXED)
// ===============================
async function handleRegister() {
  clearErrors(); hideAlerts();

  const userId = document.getElementById('reg-uid').value.trim();
  const name = document.getElementById('reg-name').value.trim();
  const password = document.getElementById('reg-pwd').value;
  const mobile = document.getElementById('reg-mobile').value.trim();
  const referralCode = document.getElementById('reg-ref').value.trim();

  if (!userId || userId.length < 6) {
    showErr('err-reg-uid', 'User ID min 6 chars');
    return;
  }
  if (!name) {
    showErr('err-reg-name', 'Enter name');
    return;
  }
  if (!password || password.length < 6) {
    showErr('err-reg-pwd', 'Password min 6 chars');
    return;
  }

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId, name, password, mobile, referralCode })
    });

    const data = await res.json();
    console.log("REGISTER RESPONSE:", data);

    if (data.success) {
      showAlert('reg-alert', data.message, 'success');

      setTimeout(() => {
        showView('login');
      }, 1500);

    } else {
      showAlert('reg-alert', data.message, 'error');
    }

  } catch (err) {
    showAlert('reg-alert', 'Server error', 'error');
  }
}

// ===============================
// DEMO LOGIN (backend call)
// ===============================
function demoLogin() {
  document.getElementById('login-uid').value = "DEMO001";
  document.getElementById('login-pwd').value = "demo1234";
  handleLogin();
}
</script>
