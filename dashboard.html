<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profit Pilot – Dashboard</title>
  
  <script>
    // --- AUTH GUARD START ---
    // Agar user login nahi hai, toh use index.html (login page) par bhej do
    if (localStorage.getItem('isAuthenticated') !== 'true') {
      window.location.href = 'index.html';
    }
    // --- AUTH GUARD END ---
  </script>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  
  <style>
    /* Aapka saara purana CSS (Jo original dashboard mein tha) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2230; --border: #21293a;
      --accent: #2563eb; --accent2: #f97316; --green: #22c55e; --red: #ef4444;
      --text: #e2e8f0; --muted: #64748b; --buy: #3b82f6;
    }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); }
    
    /* Logout button style */
    .logout-btn { 
      background: var(--red); color: white; border: none; 
      padding: 8px 16px; border-radius: 6px; cursor: pointer; 
      font-weight: 600; font-family: 'Inter', sans-serif;
      transition: 0.3s;
    }
    .logout-btn:hover { opacity: 0.8; }
    
    /* Header layout for Logout button */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="top-bar">
    <h2 style="font-weight: 800; letter-spacing: -1px;">PROFIT PILOT</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<main style="padding: 2rem;">
    <h1>Welcome to your Dashboard</h1>
    <p style="color: var(--muted);">Authentication connected successfully.</p>
    
    </main>

<script>
  // Logout Function
  function logout() {
    // Session clear karo
    localStorage.removeItem('isAuthenticated');
    localStorage.removeItem('user_token');
    // Login page par wapas bhejo
    window.location.href = 'index.html';
  }

  // Aapka purana dashboard scripts (tab switching, etc.) yahan rahega
</script>

</body>
</html>
